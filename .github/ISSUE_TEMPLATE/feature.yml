name: Feature request
description: Suggest an improvement or new capability
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or limitation you're hitting.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: Does this fit phase 1 or phase 2?
      options:
        - Phase 1 (core proxy plumbing)
        - Phase 2 (production hardening / routing intelligence)
        - Neither / unsure
    validations:
      required: true
