name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write # for cosign keyless signing

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build multi-arch binary
        run: |
          GOOS=linux  GOARCH=amd64 go build -o bin/ixr-linux-amd64   ./cmd/ixr
          GOOS=linux  GOARCH=arm64 go build -o bin/ixr-linux-arm64   ./cmd/ixr
          GOOS=darwin GOARCH=amd64 go build -o bin/ixr-darwin-amd64  ./cmd/ixr
          GOOS=darwin GOARCH=arm64 go build -o bin/ixr-darwin-arm64  ./cmd/ixr

      - name: sign binaries
        run: |
          for f in bin/ixr-*; do
            cosign sign-blob --yes "$f" --output-signature "${f}.sig"
          done

      - name: generate sbom
        run: syft packages . -o spdx-json > sbom.spdx.json

      - name: build and push docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/ixr/ixr:${{ github.ref_name }},ghcr.io/ixr/ixr:latest

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/ixr-*
            sbom.spdx.json
          generate_release_notes: true
