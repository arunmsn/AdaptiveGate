name: govulncheck

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC
  push:
    branches: [main]

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: govulncheck
        uses: golang/govulncheck-action@v1
